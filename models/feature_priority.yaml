# models/feature_priority.yaml
# weights apply when blending demand multipliers (see demand_adjuster.py)
weights:
  car_age: 1.00
  kms_per_year: 0.95
  ownership: 0.80
  make: 0.80        # only used if model multiplier is absent
  model: 0.85       # preferred over make when available
  variant: 0.60     # (reserved, no default multiplier entries yet)
  fuel: 0.55
  transmission: 0.50
  bodytype: 0.50
  city: 0.60
  reg_state: 0.30   # (reserved, no default multiplier entries yet)

# how to blend: weighted_geometric_mean is scale-safe for prices
blending: weighted_geometric_mean

# safety clamps for final composite multiplier
clamp:
  min: 0.70
  max: 1.20
